spring:
  config:
    activate:
      on-profile: default

eureka:
  client:
    register-with-eureka: true
    fetch-registry: true

    service-url:
      defaultZone: http://eureka-server:8761/eureka/

  instance:
    prefer-ip-address: false

    hostname: 192.168.1.77

    non-secure-port-enabled: true
    non-secure-port: ${server.port}

    home-page-url: http://192.168.1.77:${server.port}/
    status-page-url: http://192.168.1.77:${server.port}/actuator/info
    health-check-url: http://192.168.1.77:${server.port}/actuator/health


management:
  endpoints:
    web:
      exposure:
        include: "*"

  endpoint:
    health:
      show-details: always

  info:
    env:
      enabled: true
    java:
      enabled: true
    os:
      enabled: true
    build:
      enabled: true
    git:
      enabled: true

logging:
  level:
    root: INFO

info:
  app:
    name: ${spring.application.name}
    version: 1.0.0
    description: Microservices Lab

  company: Microservices Lab
  environment: dev
