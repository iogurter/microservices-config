spring:
  config:
    activate:
      on-profile: default

eureka:
  client:
    register-with-eureka: true
    fetch-registry: true

    service-url:
      defaultZone: http://eureka-server:8761/eureka/

instance:
    prefer-ip-address: false

    hostname: 192.168.1.77

    non-secure-port-enabled: true
    non-secure-port: ${server.port}

    home-page-url: http://192.168.1.77:${server.port}/
    status-page-url: http://192.168.1.77:${server.port}/actuator/info
    health-check-url: http://192.168.1.77:${server.port}/actuator/health


management:
  endpoints:
    web:
      exposure:
        include: "*"

logging:
  level:
    root: INFO

info:
  company: Microservices Lab
  environment: dev
